<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#061826" />
    <meta name="color-scheme" content="light" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Bebas+Neue&family=Patrick+Hand&family=Tangerine:wght@400;700&display=swap" rel="stylesheet" />
    <meta
      name="description"
      content="Nline is a digital agency creating fast websites, UI/UX design, SEO, and mobile experiences that convert."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Our50 | Digital Agency" />
    <meta
      property="og:description"
      content="Fast websites, UI/UX design, SEO, and mobile experiences that convert."
    />

    
    <meta property="og:url" content="" />
    <meta property="og:image" content="/hero-bg.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Our50 | Digital Agency" />
    <meta
      name="twitter:description"
      content="Fast websites, UI/UX design, SEO, and mobile experiences that convert."
    />
    <meta name="twitter:image" content="/hero-bg.svg" />
    <link rel="preload" as="image" href="/hero-bg.svg" fetchpriority="high" />
    <script>
      (function () {
        var url = window.location.href.split('#')[0].split('?')[0];
        var canonical = document.querySelector('link[rel="canonical"]');
        if (!canonical) {
          canonical = document.createElement('link');
          canonical.rel = 'canonical';
          document.head.appendChild(canonical);
        }
        canonical.href = url;

        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) {
          ogUrl.setAttribute('content', url);
        }
      })();
    </script>
    <style>
      :root {
        --page-bg: #f6fbff;
        --page-fg: #07131f;
        --page-muted: rgba(7, 19, 31, 0.72);
        --page-primary: #00bfff;
        --page-accent: #12c8b0;
        --page-surface: rgba(255, 255, 255, 0.72);
        --page-border: rgba(7, 19, 31, 0.08);
        --font-heading: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-body: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html {
        background: var(--page-bg);
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(18, 200, 176, 0.14), transparent 34%),
          radial-gradient(circle at left center, rgba(0, 191, 255, 0.12), transparent 28%),
          var(--page-bg);
        color: var(--page-fg);
        font-family: var(--font-body);
      }

      #root {
        min-height: 100vh;
      }

      .site-nav {
        position: fixed;
        inset: 0 0 auto 0;
        z-index: 50;
        height: 5rem;
        display: flex;
        align-items: center;
        background: transparent;
      }

      .site-nav__inner,
      .critical-shell {
        width: min(100%, 80rem);
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      .critical-hero {
        position: relative;
        min-height: 100svh;
        display: flex;
        align-items: center;
        overflow: hidden;
        padding-top: 5rem;
        background:
          linear-gradient(120deg, rgba(7, 19, 31, 0.94) 0%, rgba(7, 19, 31, 0.72) 45%, rgba(7, 19, 31, 0.9) 100%);
      }

      .critical-hero__bg {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(7, 19, 31, 0.92), rgba(7, 19, 31, 0.55) 45%, rgba(7, 19, 31, 0.82)),
          url('/hero-bg.svg') center/cover no-repeat;
        transform: translateZ(0);
      }

      .critical-hero__content {
        position: relative;
        z-index: 1;
        max-width: 42rem;
        color: #f7fbff;
      }

      .critical-hero__eyebrow {
        margin: 0 0 0.75rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--page-primary);
      }

      .critical-hero__title {
        margin: 0;
        font-family: var(--font-heading);
        font-size: clamp(2.4rem, 7vw, 4.9rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-wrap: balance;
      }

      .critical-hero__title > span > span {
        background: linear-gradient(90deg, var(--page-primary), var(--page-accent));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .critical-hero__text {
        margin: 1.25rem 0 0;
        max-width: 34rem;
        font-size: clamp(1rem, 2.6vw, 1.2rem);
        line-height: 1.7;
        color: rgba(247, 251, 255, 0.76);
      }

      .critical-hero__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 2rem;
      }

      .critical-hero__button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem 1.5rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        color: #061826;
        background: linear-gradient(90deg, #00bfff, #12c8b0);
      }

      @media (max-width: 640px) {
        .site-nav__inner,
        .critical-shell {
          padding: 0 1rem;
        }

        .critical-hero {
          min-height: 92svh;
        }
      }
    </style>
    <title>Our50</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
